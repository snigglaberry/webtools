<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #111;
      --card: #1c1c1c;
      --accent: #7f5af0;
      --text: #fff;
      --muted: #aaa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 1rem;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .box {
      background: var(--card);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 0 10px rgba(127,90,240,0.3);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 10px;
      border: 2px solid rgba(127,90,240,0.3);
      background: #111;
      color: white;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      font-weight: bold;
      cursor: pointer;
      margin: 1rem 0;
    }

    .result {
      text-align: center;
      margin-top: 1rem;
      font-size: 1.5rem;
      color: var(--accent);
    }

    @media(max-width:600px){
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>💱 Currency Converter</h1>

  <div class="box">

    <div class="row">
      <div>
        <label>Amount</label>
        <input type="number" id="amount" value="1">
      </div>

      <div>
        <label>From</label>
        <select id="from">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="AED" selected>AED</option>
          <option value="GBP">GBP</option>
          <option value="JPY">JPY</option>
          <option value="BTC">BTC</option>
          <option value="ETH">ETH</option>
        </select>
      </div>
    </div>

    <button id="swap">⇅ Swap</button>

    <div class="row">
      <div>
        <label>Converted</label>
        <input type="text" id="result" readonly>
      </div>

      <div>
        <label>To</label>
        <select id="to">
          <option value="USD" selected>USD</option>
          <option value="EUR">EUR</option>
          <option value="AED">AED</option>
          <option value="GBP">GBP</option>
          <option value="JPY">JPY</option>
          <option value="BTC">BTC</option>
          <option value="ETH">ETH</option>
        </select>
      </div>
    </div>

    <div class="result" id="rateInfo"></div>

  </div>
</div>

<script>
const amountEl = document.getElementById("amount");
const fromEl = document.getElementById("from");
const toEl = document.getElementById("to");
const resultEl = document.getElementById("result");
const rateInfo = document.getElementById("rateInfo");
const swapBtn = document.getElementById("swap");

// API endpoints
const FIAT_API = "https://api.exchangerate.host/convert";
const CRYPTO_API = "https://api.coingecko.com/api/v3/simple/price";

// detect crypto
function isCrypto(code) {
  return ["BTC","ETH"].includes(code);
}

// convert function
async function convert() {
  const amount = amountEl.value;

  const from = fromEl.value;
  const to = toEl.value;

  if (!amount) return;

  try {

    // FIAT → FIAT
    if (!isCrypto(from) && !isCrypto(to)) {
      const res = await fetch(`${FIAT_API}?from=${from}&to=${to}&amount=${amount}`);
      const data = await res.json();

      resultEl.value = data.result.toFixed(4);
      rateInfo.innerText = `1 ${from} = ${(data.result/amount).toFixed(4)} ${to}`;
    }

    // CRYPTO involved → use CoinGecko
    else {
      const ids = {
        BTC: "bitcoin",
        ETH: "ethereum"
      };

      // convert everything via USD
      const fiatRes = await fetch(`${FIAT_API}?from=${from}&to=USD&amount=${amount}`);
      const fiatData = await fiatRes.json();

      let usdValue = fiatData.result;

      if (isCrypto(from)) {
        const c = await fetch(`${CRYPTO_API}?ids=${ids[from]}&vs_currencies=usd`);
        const d = await c.json();
        usdValue = amount * d[ids[from]].usd;
      }

      if (isCrypto(to)) {
        const c = await fetch(`${CRYPTO_API}?ids=${ids[to]}&vs_currencies=usd`);
        const d = await c.json();
        resultEl.value = (usdValue / d[ids[to]].usd).toFixed(8);
      } else {
        const fiatRes2 = await fetch(`${FIAT_API}?from=USD&to=${to}&amount=${usdValue}`);
        const fiatData2 = await fiatRes2.json();
        resultEl.value = fiatData2.result.toFixed(4);
      }

      rateInfo.innerText = "Live crypto + fiat conversion";
    }

  } catch (err) {
    resultEl.value = "Error";
    rateInfo.innerText = "API error";
  }
}

// swap
swapBtn.addEventListener("click", () => {
  [fromEl.value, toEl.value] = [toEl.value, fromEl.value];
  convert();
});

// listeners
amountEl.addEventListener("input", convert);
fromEl.addEventListener("change", convert);
toEl.addEventListener("change", convert);

// initial
convert();
</script>

</body>
</html>
